<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문법 분석기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --border: #2e2c28;
    --accent: #c9a84c;
    --accent2: #7eb8a4;
    --text: #e8e4dc;
    --text-dim: #8a8478;
    --text-bright: #f5f0e8;
    --red: #c97b6a;
    --green: #7eb8a4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  header span {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .main {
    display: flex;
    flex: 1;
    height: calc(100vh - 61px);
  }

  .left {
    width: 340px;
    min-width: 260px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 12px;
    overflow-y: auto;
  }

  .left label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-family: 'JetBrains Mono', monospace;
  }

  .api-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .api-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-row input:focus { border-color: var(--accent); }

  .eye-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-size: 12px;
    padding: 5px 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .eye-btn:hover { border-color: var(--accent); color: var(--accent); }

  .api-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: -4px;
  }

  .api-hint a { color: var(--accent2); text-decoration: none; }

  textarea {
    flex: 1;
    min-height: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    padding: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }

  .lang-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .lang-btn {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

  .batch-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .batch-row label { flex-shrink: 0; }

  .batch-row input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .batch-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    width: 20px;
    text-align: right;
  }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  .progress-bar-wrap.visible { display: block; }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 2px;
  }

  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    min-height: 14px;
    text-align: center;
  }

  .status.running { color: var(--accent2); }
  .status.error { color: var(--red); }
  .status.done { color: var(--green); }

  .btn-group { display: flex; flex-direction: column; gap: 8px; }

  .start-btn {
    padding: 11px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .start-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .stop-btn {
    padding: 9px;
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }

  .stop-btn:hover { background: var(--red); color: var(--bg); }
  .stop-btn.visible { display: block; }

  .csv-btn {
    padding: 11px;
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
    text-align: center;
  }

  .csv-btn:hover { background: var(--green); color: var(--bg); }
  .csv-btn.visible { display: block; }

  .vocab-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    display: none;
  }

  .vocab-count.visible { display: block; }

  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .output-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .output-header span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .clear-btn {
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  .output {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    scroll-behavior: smooth;
  }

  .output::-webkit-scrollbar { width: 5px; }
  .output::-webkit-scrollbar-track { background: transparent; }
  .output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .chunk {
    margin-bottom: 36px;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.4s ease;
    line-height: 1.85;
    font-size: 14px;
  }

  .chunk:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .streaming-cursor::after {
    content: '▋';
    color: var(--accent);
    animation: blink 0.7s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .chunk h3 {
    font-family: 'Playfair Display', serif;
    color: var(--accent);
    font-size: 15px;
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .chunk h3:first-child { margin-top: 0; }

  .chunk h4 {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent2);
    font-size: 11px;
    margin-bottom: 8px;
    margin-top: 16px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .chunk p { margin-bottom: 10px; }
  .chunk strong { color: var(--text-bright); }
  .chunk em { color: var(--accent); font-style: italic; }

  .chunk table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 16px;
    font-size: 13px;
  }

  .chunk th {
    background: var(--surface);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 7px 11px;
    text-align: left;
    border: 1px solid var(--border);
  }

  .chunk td {
    padding: 7px 11px;
    border: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.6;
  }

  .chunk tr:hover td { background: rgba(201, 168, 76, 0.04); }

  .chunk blockquote {
    border-left: 2px solid var(--accent);
    padding: 5px 0 5px 14px;
    margin: 10px 0;
    color: var(--text-dim);
    font-size: 13px;
  }

  .chunk code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 12px;
    color: var(--accent2);
  }

  .chunk hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .chunk ul, .chunk ol { padding-left: 20px; margin-bottom: 10px; }
  .chunk li { margin-bottom: 4px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-dim);
  }

  .empty-state .icon { font-size: 32px; opacity: 0.25; }

  .empty-state p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <h1>문법 분석기</h1>
  <span>Grammar Analyzer · Auto-Continue · CSV Export</span>
</header>

<div class="main">
  <div class="left">
    <label>Anthropic API 키</label>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="sk-ant-...">
      <button class="eye-btn" onclick="toggleKeyVisibility()">👁</button>
    </div>
    <p class="api-hint">
      <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>에서 발급 · 저장 안 됨
    </p>

    <label>분석할 텍스트</label>
    <textarea id="inputText" placeholder="여기에 텍스트를 붙여넣으세요...&#10;영어, 스페인어, 일본어, 중국어 모두 가능합니다."></textarea>

    <label>언어 선택</label>
    <div class="lang-row">
      <button class="lang-btn active" data-lang="영어">영어</button>
      <button class="lang-btn" data-lang="스페인어">스페인어</button>
      <button class="lang-btn" data-lang="일본어">일본어</button>
      <button class="lang-btn" data-lang="중국어">중국어</button>
      <button class="lang-btn" data-lang="자동감지">자동감지</button>
    </div>

    <div class="batch-row">
      <label>묶음 크기</label>
      <input type="range" id="batchSize" min="3" max="15" value="8" step="1">
      <span class="batch-val" id="batchVal">8</span>
    </div>

    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="status">준비됨</div>

    <div class="btn-group">
      <button class="start-btn" id="startBtn" onclick="startAnalysis()">분석 시작</button>
      <button class="stop-btn" id="stopBtn" onclick="stopAnalysis()">⏹ 중단</button>
      <button class="csv-btn" id="csvBtn" onclick="downloadCSV()">⬇ 단어장 CSV 다운로드</button>
      <div class="vocab-count" id="vocabCount"></div>
    </div>
  </div>

  <div class="right">
    <div class="output-header">
      <span id="outputLabel">결과</span>
      <button class="clear-btn" onclick="clearOutput()">초기화</button>
    </div>
    <div class="output" id="output">
      <div class="empty-state" id="emptyState">
        <div class="icon">◈</div>
        <p>텍스트를 입력하고 분석을 시작하세요</p>
      </div>
    </div>
  </div>
</div>

<script>
let sentences = [];
let currentBatch = 0;
let batchSize = 8;
let selectedLang = '영어';
let totalSentences = 0;
let abortFlag = false;
let isRunning = false;
let vocabList = [];

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLang = btn.dataset.lang;
  });
});

const batchSlider = document.getElementById('batchSize');
const batchValEl = document.getElementById('batchVal');
batchSlider.addEventListener('input', () => {
  batchSize = parseInt(batchSlider.value);
  batchValEl.textContent = batchSize;
});

function toggleKeyVisibility() {
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function getApiKey() {
  return document.getElementById('apiKey').value.trim();
}

function splitSentences(text) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();

  // 약어 목록 임시 치환 (U.S. Mr. Dr. 등이 문장 끝으로 오인되는 것 방지)
  const abbrevs = [
    'U\.S\.', 'U\.K\.', 'U\.N\.', 'Mr\.', 'Mrs\.', 'Ms\.', 'Dr\.', 'Prof\.',
    'Sr\.', 'Jr\.', 'vs\.', 'etc\.', 'e\.g\.', 'i\.e\.', 'Jan\.', 'Feb\.',
    'Mar\.', 'Apr\.', 'Aug\.', 'Sep\.', 'Oct\.', 'Nov\.', 'Dec\.', 'St\.',
    'Ave\.', 'Blvd\.', 'approx\.', 'est\.', 'dept\.', 'govt\.',
    'No\.', 'Vol\.', 'p\.m\.', 'a\.m\.'
  ];
  let temp = text;
  const placeholders = {};
  abbrevs.forEach((abbr, i) => {
    const key = `__ABBR${i}__`;
    const regex = new RegExp(abbr, 'g');
    temp = temp.replace(regex, key);
    placeholders[key] = abbr.replace(/\\/g, '');
  });

  // 숫자 뒤 마침표도 보호 (1. 2. 같은 번호)
  temp = temp.replace(/(\d+)\./g, (m, n) => `__NUM${n}__`);

  // 문장 분리: . ! ? 뒤에 공백+대문자 or 줄바꿈이 오는 경우
  const sentences = [];
  const parts = temp.split(/(?<=[.!?](?:['"])?)\s+(?=[A-Z぀-鿿가-힣"'(])/);

  parts.forEach(part => {
    let restored = part;
    // 약어 복원
    Object.entries(placeholders).forEach(([key, val]) => {
      restored = restored.replace(new RegExp(key, 'g'), val);
    });
    // 숫자 복원
    restored = restored.replace(/__NUM(\d+)__/g, '$1.');
    restored = restored.trim();
    if (restored.length > 1) sentences.push(restored);
  });

  return sentences.length > 0 ? sentences : [text];
}

function buildPrompt(batch, startIdx, lang, totalCount) {
  const numbered = batch.map((s, i) => `Sentence ${startIdx + i + 1}: ${s}`).join('\n');
  const langLabel = lang === '자동감지' ? '자동으로 감지' : lang;

  let langExtra = '';
  if (lang === '일본어') langExtra = '- 구문 분석 표에 후리가나 열을 추가해주세요.';
  if (lang === '중국어') langExtra = '- 구문 분석 표에 병음 열을 반드시 포함해주세요.';
  if (lang === '스페인어') langExtra = '- 구문 분석 마지막에 영어 문장과 비교해주고, 스페인어 어순 그대로 영어 단어로 표현한 문장도 보여주세요.';

  return `너는 외국어 문장을 문법적으로 분석하는 최고 수준의 전문가다.
분석 언어: ${langLabel} | 전체 문장 수: ${totalCount}개

아래 문장들을 Sentence 번호 순서대로 각각 빠짐없이 분석하라.

[각 문장 분석 형식 - 반드시 아래 순서와 형식을 정확히 따를 것]

### Sentence N
**[원문 문장 전체]**

**한국어 해석:** 자연스럽고 완전한 한국어로 번역. 단순 직역이 아닌 문맥에 맞는 자연스러운 번역.

**구문 분석**

| 구성 요소 | 품사/역할 | 의미 |
|---|---|---|
| 구성요소 | 품사와 문법적 역할 | 한국어 의미 |

※ 구문 분석 주의사항:
- 문장의 모든 구성요소를 빠짐없이 분석
- 종속절/관계절/분사구문 등 복잡한 구조는 반드시 명시
- 특이한 어순, 생략, 도치 등이 있으면 ※ 메모로 설명
- 시제, 조동사의 뉘앙스도 설명
- 단편 문장(fragment)이나 비표준 표현은 명시

**어려운 단어/구문/표현**

한 문장에 어려운 표현이 여러 개라도 전부 빠짐없이 아래 형식으로 한 줄에 하나씩 작성:
🔑 CSV: 표현 | 뜻(품사·뉘앙스·사용맥락 포함) | 예시문 / 한국어번역

※ 포함 기준: 단어, 관용구, 구동사, 문법 구조, 문화적 표현, 어려운 전치사 용법 등 모두 포함. 예시문은 원문과 다른 새로운 문장으로 작성.
${langExtra}

분석할 문장:
${numbered}`;
}

function extractVocab(text, lang) {
  const lines = text.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed.startsWith('🔑 CSV:')) continue;
    const content = trimmed.replace('🔑 CSV:', '').trim();
    const parts = content.split('|').map(p => p.trim());
    if (parts.length < 2) continue;

    const expression = parts[0] || '';
    const meaning = parts[1] || '';
    const example = parts[2] || '';

    if (!expression || !meaning) continue;

    let phonetics = '';
    if (lang === '일본어' || lang === '중국어') {
      const match = expression.match(/[（(]([^）)]+)[）)]/);
      phonetics = match ? match[1] : '';
    }

    vocabList.push([expression, phonetics, meaning, example]);
  }
  updateVocabCount();
}

function updateVocabCount() {
  const el = document.getElementById('vocabCount');
  if (vocabList.length > 0) {
    el.textContent = `🔑 수집된 표현: ${vocabList.length}개`;
    el.classList.add('visible');
    document.getElementById('csvBtn').classList.add('visible');
  }
}

function downloadCSV() {
  if (vocabList.length === 0) return;

  let bHeader = '빈칸';
  if (selectedLang === '일본어') bHeader = '후리가나';
  if (selectedLang === '중국어') bHeader = '병음';

  const header = ['표현', bHeader, '뜻', '예시 / 한국어 번역'];
  const rows = [header, ...vocabList];

  const csv = rows.map(row =>
    row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
  ).join('\r\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '단어장.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function renderMarkdown(md) {
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^---+$/gm, '<hr>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/(\|.+\|\n)+/g, (tableBlock) => {
      const rows = tableBlock.trim().split('\n');
      let html = '<table>';
      rows.forEach((row, idx) => {
        const cells = row.split('|').filter(c => c.trim() !== '');
        if (idx === 0) {
          html += '<tr>' + cells.map(c => `<th>${c.trim()}</th>`).join('') + '</tr>';
        } else if (idx === 1 && cells.every(c => /^[-: ]+$/.test(c))) {
          // skip
        } else {
          html += '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
        }
      });
      return html + '</table>';
    })
    .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/^(?!<[htublc])(.+)$/gm, '<p>$1</p>')
    .replace(/<p>\s*<\/p>/g, '');
}

function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + cls;
}

function setProgress(done, total) {
  const pct = total > 0 ? (done / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('outputLabel').textContent = `결과 — ${done} / ${total} 문장 완료`;
}

function clearOutput() {
  document.getElementById('output').innerHTML =
    '<div class="empty-state" id="emptyState"><div class="icon">◈</div><p>텍스트를 입력하고 분석을 시작하세요</p></div>';
  setProgress(0, 0);
  document.getElementById('outputLabel').textContent = '결과';
  vocabList = [];
  document.getElementById('csvBtn').classList.remove('visible');
  document.getElementById('vocabCount').classList.remove('visible');
  setStatus('준비됨');
  document.getElementById('progressWrap').classList.remove('visible');
}

async function startAnalysis() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { setStatus('텍스트를 입력해주세요.', 'error'); return; }
  if (isRunning) return;

  sentences = splitSentences(text);
  totalSentences = sentences.length;
  if (totalSentences === 0) { setStatus('문장을 찾을 수 없습니다.', 'error'); return; }

  currentBatch = 0;
  abortFlag = false;
  isRunning = true;
  vocabList = [];
  document.getElementById('csvBtn').classList.remove('visible');
  document.getElementById('vocabCount').classList.remove('visible');

  const emptyEl = document.getElementById('emptyState');
  if (emptyEl) emptyEl.remove();

  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').classList.add('visible');
  document.getElementById('progressWrap').classList.add('visible');

  appendChunk(`## 총 문장 수: ${totalSentences}개\n\n순서대로 자동 분석을 시작합니다.`);
  setProgress(0, totalSentences);

  await runBatches();
}

async function runBatches() {
  while (currentBatch * batchSize < totalSentences && !abortFlag) {
    const start = currentBatch * batchSize;
    const end = Math.min(start + batchSize, totalSentences);
    const batch = sentences.slice(start, end);

    setStatus(`분석 중... (${end}/${totalSentences})`, 'running');

    const prompt = buildPrompt(batch, start, selectedLang, totalSentences);
    const chunkDiv = document.createElement('div');
    chunkDiv.className = 'chunk streaming-cursor';
    document.getElementById('output').appendChild(chunkDiv);
    scrollToBottom();

    const { success, fullText } = await streamChunk(prompt, chunkDiv);
    if (!success) break;

    extractVocab(fullText, selectedLang);
    chunkDiv.classList.remove('streaming-cursor');
    currentBatch++;
    setProgress(end, totalSentences);
    scrollToBottom();

    if (currentBatch * batchSize < totalSentences && !abortFlag) {
      await sleep(600);
    }
  }

  if (!abortFlag) {
    setStatus(`완료! 총 ${totalSentences}개 문장 분석`, 'done');
    updateVocabCount();
  } else {
    setStatus('중단됨', 'error');
  }

  isRunning = false;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').classList.remove('visible');
}

async function streamChunk(prompt, divEl) {
  let fullText = '';
  try {
    const headers = { 'Content-Type': 'application/json' };
    const apiKey = getApiKey();
    if (apiKey) {
      headers['x-api-key'] = apiKey;
      headers['anthropic-version'] = '2023-06-01';
      headers['anthropic-dangerous-direct-browser-access'] = 'true';
    } else {
      showError('API 키를 입력해주세요.');
      return { success: false, fullText: '' };
    }

    // 로딩 표시
    divEl.innerHTML = '<p style="color:var(--text-dim);font-family:JetBrains Mono,monospace;font-size:12px;">⏳ 분석 중...</p>';

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        stream: false,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      let errMsg = 'HTTP ' + res.status;
      try {
        const err = await res.json();
        errMsg = err.error?.message || errMsg;
      } catch {}
      showError('API 오류: ' + errMsg);
      return { success: false, fullText: '' };
    }

    const data = await res.json();
    fullText = data?.content?.[0]?.text || '';

    if (!fullText) {
      showError('응답이 비어있습니다. API 키를 확인해주세요.');
      return { success: false, fullText: '' };
    }

    divEl.innerHTML = renderMarkdown(fullText);
    scrollToBottom();

    return { success: true, fullText };
  } catch (e) {
    showError('네트워크 오류: ' + e.message + ' (CORS 또는 네트워크 문제일 수 있습니다)');
    return { success: false, fullText };
  }
}

function showError(msg) {
  setStatus(msg, 'error');
  // 오른쪽 화면에도 오류 표시
  const div = document.createElement('div');
  div.className = 'chunk';
  div.innerHTML = '<p style="color:var(--red);font-family:JetBrains Mono,monospace;font-size:13px;">❌ ' + msg + '</p>';
  document.getElementById('output').appendChild(div);
  scrollToBottom();
}

function appendChunk(md) {
  const div = document.createElement('div');
  div.className = 'chunk';
  div.innerHTML = renderMarkdown(md);
  document.getElementById('output').appendChild(div);
  scrollToBottom();
}

function stopAnalysis() { abortFlag = true; }

function scrollToBottom() {
  const out = document.getElementById('output');
  out.scrollTop = out.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
